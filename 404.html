<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stránka se ztratila ve tmě — Wonderland Halloween 2026</title>
  <meta name="robots" content="noindex">
  <meta http-equiv="refresh" content="5;url=/">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    body { padding-bottom: 0; }
    .nf-wrap {
      min-height: 100svh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center;
      padding: 2rem;
      position: relative;
      overflow: hidden;
      background:
        radial-gradient(ellipse at 50% 100%, rgba(138, 15, 29, 0.25), transparent 60%),
        var(--bg);
    }
    .nf-orn { width: min(360px, 70%); mix-blend-mode: screen; opacity: 0.9; margin-bottom: 1.6rem; }
    .nf-code {
      font-family: var(--font-head);
      font-size: clamp(4rem, 18vw, 7rem);
      line-height: 1;
      color: var(--gold-light);
      text-shadow: 0 0 40px rgba(216, 169, 78, 0.4);
    }
    .nf-title {
      font-family: var(--font-head);
      font-size: clamp(1.2rem, 4.5vw, 1.8rem);
      color: var(--gold);
      margin: 0.6rem 0 0.9rem;
    }
    .nf-text { color: var(--smoke); max-width: 46ch; margin-bottom: 1.8rem; font-size: 0.95rem; }
    .nf-hint { color: #5d5568; font-size: 0.78rem; margin-top: 2rem; }
  </style>
</head>
<body>
  <div class="nf-wrap">
    <img class="nf-orn" src="/img/orn-bats-1200.webp" alt="" aria-hidden="true">
    <div class="nf-code">404</div>
    <h1 class="nf-title">Tahle stránka se ztratila ve tmě</h1>
    <p class="nf-text">Web se pro ročník 2026 kompletně proměnil — stará stránka už neexistuje. Vše, co hledáš (vstupenky, program, kostýmy i kontakty), najdeš na hlavní stránce.</p>
    <a class="btn btn-primary btn-lg" href="/">Vstoupit do Wonderlandu</a>
    <p class="nf-hint">Za 5 vteřin tě přeneseme automaticky…</p>
  </div>
</body>
</html>
